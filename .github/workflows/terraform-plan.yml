name: terraform-plan

on:
  pull_request:

permissions:
  id-token: write # required to fetch the OIDC token for AssumeRoleWithWebIdentity
  contents: read
  pull-requests: write # required to post the plan result as a PR comment

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-test
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::417441750247:role/github-actions-terraform-plan
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - run: terraform init

      - name: terraform plan
        id: plan
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan result to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('mcp-test/plan_output.txt', 'utf8');
            const truncated = output.length > 60000
              ? output.slice(0, 60000) + '\n\n... (truncated)'
              : output;
            const body = `#### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
