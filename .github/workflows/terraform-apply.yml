name: terraform-apply

on:
  push:
    branches: [main]

permissions:
  id-token: write # required to fetch the OIDC token for AssumeRoleWithWebIdentity
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-test
    steps:
      - uses: actions/checkout@v4

      - name: DEBUG - inspect OIDC token sub claim
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null || echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+')
          echo "$PAYLOAD" | jq '{sub, aud, repository, ref, event_name}'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::417441750247:role/github-actions-terraform-apply
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - run: terraform init

      - run: terraform apply -auto-approve -input=false
